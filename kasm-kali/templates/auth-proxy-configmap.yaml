{{- if .Values.authProxy.enabled -}}
{{- $fullName := include "kasm-kali.fullname" . -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $fullName }}-auth-proxy
  labels:
    {{- include "kasm-kali.labels" . | nindent 4 }}
data:
  nginx.conf: |
    worker_processes 1;
    error_log /dev/stderr warn;
    pid /tmp/nginx.pid;

    events {
      worker_connections 1024;
    }

    http {
      access_log /dev/stdout;
      client_body_temp_path /tmp/client_body;
      proxy_temp_path /tmp/proxy;

      upstream kasm {
        server 127.0.0.1:6901;
      }

      server {
        listen 8080;

        location / {
          proxy_pass https://kasm;
          proxy_ssl_verify off;
          proxy_http_version 1.1;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_set_header Authorization "Basic {{ include "kasm-kali.basicAuthHeader" . }}";

          # WebSocket support
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection "upgrade";
          proxy_read_timeout 3600s;
          proxy_send_timeout 3600s;
        }
      }
    }
{{- end }}
