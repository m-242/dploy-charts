# kind-vm — run a kind cluster inside a real KubeVirt VM.
#
# A stock Fedora CoreOS guest (kubevirt stream) boots and is configured at first
# boot by Ignition (compiled in-cluster by butane-operator). A systemd unit mounts
# the BUNDLE disk, `kind create`s the cluster, `kind load`s the bundled images and
# `kubectl apply`s the bundled manifests. Because it is a real VM there is a real
# kernel and real disks (no /dev/kmsg, inotify, cAdvisor or overlay hacks like
# DinD-on-Kata). Same delivery rule as compose-vm: NO registry credentials ever
# reach the guest — the kubelet pulls the OS + bundle containerDisks (creds via
# imagePullSecret, at the pod level) and the guest only sees a read-only disk.
#
# Each instance is self-contained: it boots from the (immutable, CI-built) bundle
# and creates the kind cluster at boot (~1 min, airgap). The bundle IS the golden
# image — there is no live-VM snapshot/clone machinery (kept simple on purpose).

# The challenge BUNDLE: a containerDisk (raw/ext4) holding the kind topology
# (kind-config.yaml), the manifests to apply (manifests/ or manifests.yaml),
# image archives (images/*.tar) and the kind/kubectl binaries (bin/). See
# example/build-bundle.sh.
source:
  reference: ""          # bundle containerDisk image (required), e.g. zot…/my-chall-kindbundle:latest

# OS containerDisk (FCOS kubevirt stream → reads Ignition from the config-drive).
image: quay.io/fedora/fedora-coreos-kubevirt:stable
imagePullPolicy: IfNotPresent
imagePullSecret: ""      # dockerconfigjson Secret used by the KUBELET to pull OS + bundle

# Port the in-cluster app publishes via kind extraPortMapping (the hostPort in the
# bundle's kind-config). The VM masquerade forwards it and the Service targets it.
port: 8080

cluster:
  name: kind

# VM sizing — one VM runs the whole kind cluster, so size for everything in it.
cpu: 1
memory: 2Gi

# Service exposing the published port.
service:
  type: ClusterIP
  port: 80

# Optional Gateway API HTTPRoute. host is overridden by dploy's ingressHost.
httpRoute:
  enabled: false
  parentRefs: []         # required when enabled: [{ name: ctf-gateway, namespace: default }]
  hostnames: []
  annotations: {}

# Optional Ingress (alternative to httpRoute).
ingress:
  enabled: false
  className: ""
  host: ""
  tlsSecret: ""
  annotations: {}

# qemu-guest-agent : aide au debug (KubeVirt remonte l'IP/l'OS, active virtctl).
# Absent de FCOS → installé via rpm-ostree --apply-live (sans reboot), best-effort.
guestAgent:
  enabled: true

# Debug : login du compte core (console / virtctl ssh). Vider en prod.
# (sshAuthorizedKey ouvre aussi le port 22 sur la VM, sinon seul le port app est forwardé.)
debug:
  # Mot de passe console par défaut = "kind" (compte core). Vider pour désactiver.
  passwordHash: "$6$K7qGLVxyiHGiFjmc$DGtefnwUKkvHy4.gmwfqcQhafd4qSEx3E185sBKSQeHUYQsYEE8sMZNQ.BlDhArzXHH96yu/07khoiHbw9Y5u/"
  sshAuthorizedKey: ""

# Fallback si le bundle ne fournit pas kind/kubectl ni l'image node.
versions:
  kind: v0.27.0
  kubectl: v1.32.2
  node: docker.io/kindest/node:v1.32.2

# dploy-injected: ingressHost (+ username, uuid)
ingressHost: ""
