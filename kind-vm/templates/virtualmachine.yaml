apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: {{ include "kind-vm.fullname" . }}
  labels:
    {{- include "kind-vm.labels" . | nindent 4 }}
spec:
  runStrategy: RerunOnFailure
  template:
    metadata:
      labels:
        {{- include "kind-vm.selectorLabels" . | nindent 8 }}
        kubevirt.io/domain: {{ include "kind-vm.fullname" . }}
    spec:
      domain:
        cpu:
          cores: {{ .Values.cpu }}
        memory:
          guest: {{ .Values.memory }}
        devices:
          disks:
            - name: rootdisk
              disk:
                bus: virtio
            # Bundle du challenge (ro). Le kubelet le pulle (creds via
            # imagePullSecret au niveau pod) ; le guest ne voit qu'un disque.
            - name: bundledisk
              serial: kindbundle
              disk:
                bus: virtio
            - name: cloudinit
              disk:
                bus: virtio
          interfaces:
            - name: default
              masquerade: {}
              ports:
                - port: {{ .Values.port }}
                {{- if .Values.debug.sshAuthorizedKey }}
                - port: 22      # debug SSH (sinon masquerade ne forwarde que l'app)
                {{- end }}
          rng: {}
      networks:
        - name: default
          pod: {}
      volumes:
        - name: rootdisk
          containerDisk:
            image: {{ .Values.image | quote }}
            imagePullPolicy: {{ .Values.imagePullPolicy }}
            {{- with .Values.imagePullSecret }}
            imagePullSecret: {{ . }}
            {{- end }}
        - name: bundledisk
          containerDisk:
            image: {{ required "source.reference is required (the bundle containerDisk image)" .Values.source.reference | quote }}
            imagePullPolicy: {{ .Values.imagePullPolicy }}
            {{- with .Values.imagePullSecret }}
            imagePullSecret: {{ . }}
            {{- end }}
        # Ignition compilé par butane-operator.
        - name: cloudinit
          cloudInitConfigDrive:
            secretRef:
              name: {{ include "kind-vm.fullname" . }}-ignition
