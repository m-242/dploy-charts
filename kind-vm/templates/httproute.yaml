{{- if .Values.httpRoute.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "kind-vm.fullname" . }}
  labels:
    {{- include "kind-vm.labels" . | nindent 4 }}
  {{- with .Values.httpRoute.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
    {{- toYaml .Values.httpRoute.parentRefs | nindent 4 }}
  hostnames:
    {{- if .Values.ingressHost }}
    - {{ .Values.ingressHost | quote }}
    {{- else }}
    {{- toYaml .Values.httpRoute.hostnames | nindent 4 }}
    {{- end }}
  rules:
    - backendRefs:
        - name: {{ include "kind-vm.fullname" . }}
          port: {{ .Values.service.port }}
{{- end }}
