{{- if .Values.snapshot.enabled }}
# Snapshot du PVC root de la base golden → source des clones (dataVolumeClone).
# À appliquer UNE FOIS la base bootstrappée ET arrêtée (vm.running=false).
apiVersion: snapshot.storage.k8s.io/v1
kind: VolumeSnapshot
metadata:
  name: {{ .Values.snapshot.name }}
  labels:
    {{- include "kind-vm.labels" . | nindent 4 }}
spec:
  {{- with .Values.snapshot.className }}
  volumeSnapshotClassName: {{ . }}
  {{- end }}
  source:
    persistentVolumeClaimName: {{ .Values.snapshot.sourcePVC | default (printf "%s-root" (include "kind-vm.fullname" .)) }}
{{- end }}
