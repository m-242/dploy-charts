apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vscode.fullname" . }}
  labels:
    {{- include "vscode.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "vscode.selectorLabels" . | nindent 6 }}
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        {{- include "vscode.labels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "vscode.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: code-server
          image: "{{ .Values.container.image.repository }}:{{ .Values.container.image.tag }}"
          imagePullPolicy: {{ .Values.container.image.pullPolicy }}
          args:
            - --bind-addr
            - "0.0.0.0:8080"
            {{- if .Values.codeServer.password }}
            - --auth
            - password
            {{- else }}
            - --auth
            - none
            {{- end }}
            - {{ .Values.codeServer.workspaceFolder }}
            {{- range .Values.codeServer.extraArgs }}
            - {{ . | quote }}
            {{- end }}
          env:
            {{- if .Values.codeServer.password }}
            - name: PASSWORD
              value: {{ .Values.codeServer.password | quote }}
            {{- end }}
            {{- if .Values.username }}
            - name: DPLOY_USERNAME
              value: {{ .Values.username | quote }}
            {{- end }}
            {{- if .Values.uuid }}
            - name: DPLOY_UUID
              value: {{ .Values.uuid | quote }}
            {{- end }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            {{- toYaml .Values.container.securityContext | nindent 12 }}
          resources:
            {{- toYaml .Values.container.resources | nindent 12 }}
          volumeMounts:
            {{- if .Values.persistence.enabled }}
            - name: data
              mountPath: {{ .Values.persistence.mountPath }}
            {{- end }}
      volumes:
        {{- if .Values.persistence.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "vscode.fullname" . }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
