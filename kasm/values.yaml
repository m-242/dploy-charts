# Default values for kasm-kali.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

container:
  image:
    repository: kasmweb/core-kali-rolling
    tag: "1.18.0"
    pullPolicy: IfNotPresent

  securityContext:
    capabilities:
      drop:
        - ALL
      add:
        - SYS_PTRACE
        - NET_RAW
        - NET_ADMIN
    allowPrivilegeEscalation: false

  resources:
    requests:
      cpu: "500m"
      memory: "2Gi"
    limits:
      cpu: "2"
      memory: "4Gi"

# Kasm-specific configuration
kasm:
  vncPassword: "password"
  user: kasm_user
  resolution: "1920x1080"

# Auth proxy sidecar (auto-injects basic auth header)
authProxy:
  enabled: true
  repository: nginx
  tag: alpine
  pullPolicy: IfNotPresent

  resources:
    requests:
      cpu: "10m"
      memory: "16Mi"
    limits:
      cpu: "100m"
      memory: "64Mi"

  securityContext:
    capabilities:
      drop:
        - ALL
    allowPrivilegeEscalation: false
    runAsNonRoot: true
    runAsUser: 101
    readOnlyRootFilesystem: true

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: false
  # Automatically mount a ServiceAccount's API credentials?
  automount: false
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 6901

ingress:
  enabled: false
  className: ""
  annotations:
    {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

# Gateway API HTTPRoute — alternative to Ingress for clusters using the
# Gateway API (e.g. Cilium agentgateway). May coexist with ingress.enabled,
# but you'd normally enable exactly one. Routes "/" to the chart's service.
# Kasm listens on TLS at port 6901; for HTTPS upstream over Gateway API,
# attach a BackendTLSPolicy to the service (separate from this chart).
httpRoute:
  enabled: false
  # parentRefs: list of Gateways this route attaches to (required when enabled).
  parentRefs: []
  #   - name: my-gateway
  #     namespace: default
  # hostnames: list of FQDNs the route claims (e.g. <instance>.example.com).
  hostnames: []
  # annotations: e.g. external-dns target for the parent Gateway's address.
  annotations: {}

persistence:
  enabled: true
  storageClass: ""
  accessModes:
    - ReadWriteOnce
  mountPath: /home/kasm-user
  size: "5Gi"

# Network Policy configuration
networkPolicy:
  enabled: true
  allowEgress: true

# Additional volumes on the output Deployment definition.
volumes: []
# - name: foo
#   secret:
#     secretName: mysecret
#     optional: false

# Additional volumeMounts on the output Deployment definition.
volumeMounts: []
# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true

## @param affinity Affinity for pod assignment
affinity: {}

## @param nodeSelector Node labels for pod assignment
nodeSelector: {}

## @param tolerations Tolerations for pod assignment
tolerations: []

# Dploy-injected values
# username: ""
# uuid: ""
# ingressHost: ""
