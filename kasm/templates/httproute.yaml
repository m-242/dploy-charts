{{- if .Values.httpRoute.enabled -}}
{{- $fullName := include "kasm-kali.fullname" . -}}
{{- $svcPort := .Values.service.port -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $fullName }}
  labels:
    {{- include "kasm-kali.labels" . | nindent 4 }}
  {{- with .Values.httpRoute.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
    {{- toYaml .Values.httpRoute.parentRefs | nindent 4 }}
  {{- with .Values.httpRoute.hostnames }}
  hostnames:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      # NOTE: Kasm listens on TLS at port 6901. With Ingress, the nginx
      # annotation "backend-protocol: HTTPS" handles upstream TLS. The Gateway
      # API equivalent is a BackendTLSPolicy attached to the backend service —
      # add one separately if your Gateway implementation supports it.
      backendRefs:
        - name: {{ $fullName }}
          port: {{ $svcPort }}
{{- end }}
