{{- $fullName := include "webshell.fullname" . -}}
{{- include "webshell.validateValues" . -}}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ $fullName }}
  labels:
    {{- include "webshell.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  podManagementPolicy: Parallel
  persistentVolumeClaimRetentionPolicy:
    whenDeleted: Delete
    whenScaled: Retain
  selector:
    matchLabels:
      {{- include "webshell.container.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- if ne .Values.tty2web.deploymentMode "sidecar" }}
        # Sidecar mode runs tty2web in this pod and needs egress to kube-apiserver,
        # so the deny-all network policy only applies in deployment mode.
        network: deny-all
        {{- end }}
        {{- include "webshell.labels" . | nindent 8 }}
        app.kubernetes.io/component: container
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      enableServiceLinks: false
      # Sidecar mode needs the SA token so the colocated tty2web can `kubectl exec`
      # into this pod's `container` (the toolbox); deployment mode keeps it off.
      automountServiceAccountToken: {{ eq .Values.tty2web.deploymentMode "sidecar" }}
      serviceAccountName: {{ include "webshell.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      hostname: {{ $fullName }}
      hostAliases:
      - ip: "127.0.0.1"
        hostnames:
        - {{ $fullName }}
      containers:
        - name: container
          securityContext:
            {{- toYaml .Values.container.securityContext | nindent 12 }}
          image: "{{ .Values.container.image.repository }}:{{ .Values.container.image.tag }}"
          imagePullPolicy: {{ .Values.container.image.pullPolicy }}
          command:
            - sleep
          args:
            - infinity
          livenessProbe:
            {{- toYaml .Values.container.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.container.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.container.resources | nindent 12 }}
          {{- with .Values.container.volumeMounts }}
          volumeMounts:
            - name: data
              mountPath: {{ .Values.persistence.mountPath }}
          {{- end }}
        {{- if and .Values.tty2web.enabled (eq .Values.tty2web.deploymentMode "sidecar") }}
        # tty2web as a sidecar in the same pod as the toolbox. `kubectl exec`
        # still goes through the API server (targets this pod's `container`),
        # so RBAC + SA token are required; the rendered Role/RoleBinding
        # below cover that.
        - name: tty2web
          securityContext:
            {{- toYaml .Values.tty2web.securityContext | nindent 12 }}
          image: "{{ .Values.tty2web.repository }}:{{ .Values.tty2web.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.tty2web.pullPolicy }}
          command:
            - tty2web
          args: ["--verbose", "-w", "--port", "{{ .Values.tty2web.services.port }}", "kubectl", "exec", "{{ include "webshell.pod.name" . }}", "-it", "-c", "container", "--", "/bin/bash", "-l"]
          ports:
            - name: http
              containerPort: {{ .Values.tty2web.services.port }}
              protocol: TCP
          resources:
            {{- toYaml .Values.tty2web.resources | nindent 12 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        storageClassName: {{ .Values.persistence.storageClass }}
        accessModes:
          {{- range .Values.persistence.accessModes }}
          - {{ . | quote }}
          {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size | quote }}
