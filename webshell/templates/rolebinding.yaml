{{- if and .Values.rbac.create (eq .Values.tty2web.deploymentMode "deployment") -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "webshell.fullname" . }}-exec
subjects:
- kind: ServiceAccount
  name: {{ include "webshell.fullname" . }}
  namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: {{ include "webshell.fullname" . }}-exec
  apiGroup: rbac.authorization.k8s.io
{{- end }}
